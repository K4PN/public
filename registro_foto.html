<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro · Reportaje Fotográfico</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1a1a2e;
      --secondary: #16213e;
      --accent: #c8986b;
      --accent-light: #d4ab7f;
      --text-light: #f5f5f5;
      --text-muted: #a0a0a0;
      --surface: #0f0f1e;
      --border: rgba(200, 152, 107, 0.2);
      --shadow: rgba(0, 0, 0, 0.4);
      --danger: rgba(255,120,120,.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Crimson Pro', serif;
      background: linear-gradient(135deg, var(--surface) 0%, var(--primary) 100%);
      color: var(--text-light);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.55;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .info-card {
      background: rgba(22, 33, 62, 0.62);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 8px 32px var(--shadow);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 720px){
      .grid { grid-template-columns: 1fr 1fr; }
      .span2 { grid-column: 1 / -1; }
    }

    .form-group { margin-bottom: 0; }

    .form-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      display: block;
      font-weight: 500;
    }

    .form-input,
    .form-textarea,
    .form-file {
      width: 100%;
      padding: 14px 16px;
      background: rgba(15, 15, 30, 0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-light);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-file { padding: 12px 14px; }

    .form-input:focus,
    .form-textarea:focus,
    .form-file:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 152, 107, 0.1);
    }

    .form-textarea { min-height: 120px; resize: vertical; }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn-add,
    .btn-export,
    .btn-danger {
      padding: 15px 18px;
      border-radius: 12px;
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      min-height: 52px;
      flex: 1;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: var(--primary);
      box-shadow: 0 4px 20px rgba(200, 152, 107, 0.28);
      text-transform: uppercase;
    }

    .btn-export {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-light);
      border: 1px solid var(--border);
      text-transform: uppercase;
    }

    .btn-danger {
      background: rgba(255,255,255,.05);
      color: var(--text-light);
      border: 1px solid rgba(255,120,120,.28);
      text-transform: uppercase;
    }

    .btn-add:hover,
    .btn-export:hover,
    .btn-danger:hover,
    .icon-btn:hover,
    .btn:hover {
      transform: translateY(-2px);
    }

    .photos-section { margin-top: 26px; }

    .photos-title {
      font-size: 1.45rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .evidence-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      background: rgba(200, 152, 107, 0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
      color: var(--text-light);
      white-space: nowrap;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 720px){
      .photo-grid { grid-template-columns: 1fr 1fr; }
    }

    .photo-card {
      background: rgba(22, 33, 62, 0.4);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .photo-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .photo-number {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .photo-image-wrap {
      background: rgba(0,0,0,.22);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,.06);
    }

    .photo-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-note {
      color: var(--text-light);
      font-size: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
      padding-top: 4px;
    }

    .photo-filename {
      color: var(--text-muted);
      font-size: .95rem;
    }

    .photo-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .icon-btn, .btn {
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-family: inherit;
      font-size: .95rem;
    }

    /* FIX: btn-secondary no estaba definido — se añade */
    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-light);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: rgba(255,255,255,.12); }

    .icon-btn.danger { border-color: rgba(255,120,120,.25); }
    .icon-btn.danger:hover { background: rgba(255,120,120,.12); }

    .empty-state {
      text-align: center;
      padding: 46px 16px;
      color: var(--text-muted);
      font-style: italic;
      border: 1px dashed rgba(200, 152, 107, 0.25);
      border-radius: 14px;
      background: rgba(22,33,62,0.25);
    }

    .empty-state svg {
      width: 72px;
      height: 72px;
      margin-bottom: 14px;
      opacity: 0.25;
      display:block;
      margin-left:auto;
      margin-right:auto;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      padding: 16px;
    }

    .modal-overlay.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .modal {
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      margin-top: 12px;
      max-height: calc(100dvh - 24px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .modal h2 {
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--accent);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
      position: sticky;
      bottom: 0;
      background: var(--secondary);
      padding-top: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      z-index: 5;
    }

    .hint {
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .preview-box {
      margin-top: 10px;
      background: rgba(0,0,0,.18);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.05);
      min-height: 140px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 280px;
      border-radius: 10px;
      display: block;
    }

    .preview-placeholder { color: var(--text-muted); text-align:center; }

    .capture-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .camera-box {
      margin-top: 10px;
      background: rgba(0,0,0,.18);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.05);
      display: none;
      gap: 10px;
      flex-direction: column;
    }

    .camera-box.active { display: flex; }

    .camera-video {
      width: 100%;
      max-height: 320px;
      background: #000;
      border-radius: 10px;
      object-fit: cover;
    }

    .camera-note {
      font-family: 'DM Mono', monospace;
      font-size: 0.76rem;
      color: var(--text-muted);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.75);
      border: 1px solid var(--border);
      color: var(--text-light);
      padding: 10px 14px;
      border-radius: 999px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      display: none;
      z-index: 2000;
      max-width: calc(100% - 28px);
      text-align: center;
    }

    .toast.show { display:block; }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .button-group, .modal-buttons { flex-direction: column; }
      .btn-add, .btn-export, .btn-danger, .btn { width: 100%; }
      .modal { padding: 20px; }
      .form-textarea { min-height: 90px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Reportaje Fotográfico de Registro</h1>
      <div class="subtitle">Captura, organiza y exporta a ODT o PDF · 2 columnas · 4 fotos por página</div>
    </div>

    <section class="info-card" aria-label="Datos del registro">
      <div class="grid">
        <div class="form-group">
          <label class="form-label" for="asunto">Asunto</label>
          <input class="form-input" id="asunto" placeholder="Ej: Entrada y registro en domicilio" />
        </div>
        <div class="form-group">
          <label class="form-label" for="grupo">Grupo de Investigación</label>
          <input class="form-input" id="grupo" placeholder="Ej: Grupo / Unidad" />
        </div>
        <div class="form-group">
          <label class="form-label" for="juzgado">Juzgado</label>
          <input class="form-input" id="juzgado" placeholder="Ej: J. Instrucción nº..." />
        </div>
        <div class="form-group">
          <label class="form-label" for="procedimiento">Procedimiento</label>
          <input class="form-input" id="procedimiento" placeholder="Ej: DP 123/2026" />
        </div>
        <div class="form-group">
          <label class="form-label" for="fechaHora">Fecha y hora del registro</label>
          <input class="form-input" id="fechaHora" type="datetime-local" />
        </div>
        <div class="form-group span2">
          <label class="form-label" for="direccion">Dirección</label>
          <input class="form-input" id="direccion" placeholder="C/ ..., nº..., localidad" />
        </div>
        <div class="form-group span2">
          <label class="form-label" for="observacionesGenerales">Observaciones generales</label>
          <textarea class="form-textarea" id="observacionesGenerales" placeholder="Observaciones generales del reportaje o del registro."></textarea>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-add" id="btnGuardarCabecera" type="button">Guardar datos</button>
        <button class="btn-danger" id="btnResetAll" type="button">Borrar todo</button>
      </div>
    </section>

    <div class="button-group">
      <button class="btn-add" id="btnOpenModal" type="button">Añadir fotografía</button>
      <button class="btn-export" id="btnExportJson" type="button">Exportar JSON</button>
      <button class="btn-export" id="btnExportOdt" type="button">Exportar ODT</button>
      <button class="btn-export" id="btnExportPdf" type="button">Exportar PDF</button>
    </div>

    <section class="photos-section">
      <div class="photos-title">
        <span>Fotografías</span>
        <span class="evidence-count" id="count">0 fotografías</span>
      </div>

      <div id="list" class="photo-grid"></div>

      <div id="empty" class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7h4l2-2h4l2 2h4v12H4V7z" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="13" r="3.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Aún no has añadido fotografías. Pulsa "Añadir fotografía".
      </div>
    </section>
  </div>

  <!-- MODAL AÑADIR / EDITAR FOTO -->
  <div class="modal-overlay" id="backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h2 id="modalTitle">Añadir fotografía</h2>

      <div class="form-group">
        <label class="form-label" for="fotoNumero">Nº de foto</label>
        <input class="form-input" id="fotoNumero" inputmode="numeric" placeholder="Ej: 001" />
      </div>

      <div class="form-group">
        <label class="form-label">Imagen</label>
        <!-- FIX: capture="environment" eliminado para permitir también galería en escritorio;
             se añade también input sin capture para seleccionar archivo -->
        <input id="fotoArchivo" type="file" accept="image/*" style="display:none" />
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="btn-add" id="btnSolicitarCamara" type="button" style="flex:1;">📷 Cámara</button>
          <button class="btn-export" id="btnSeleccionarArchivo" type="button" style="flex:1;">🖼️ Galería / archivo</button>
        </div>
      </div>

      <div class="preview-box" id="previewBox">
        <div class="preview-placeholder" id="previewPlaceholder">Toma o selecciona una fotografía para ver la vista previa.</div>
      </div>

      <div class="form-group" style="margin-top:12px;">
        <label class="form-label" for="fotoNota">Nota / pie de foto</label>
        <textarea class="form-textarea" id="fotoNota" placeholder="Ej: Vista general del salón a la entrada. Se aprecia mesa principal y equipo informático al fondo."></textarea>
      </div>

      <div class="modal-buttons">
        <button class="btn btn-add" id="btnAddPhoto" type="button" data-mode="add">Añadir</button>
        <button class="btn btn-secondary" id="btnClearFields" type="button">Limpiar</button>
        <button class="btn btn-secondary" id="btnCloseModal" type="button">Cerrar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script>
    'use strict';

    const LS_KEY = 'reportaje_fotografico_registro_v1';
    const $ = (id) => document.getElementById(id);

    // ── Estado global ──────────────────────────────────────────────
    const state = {
      header: {
        asunto: '',
        grupo: '',
        juzgado: '',
        procedimiento: '',
        fechaHora: '',
        direccion: '',
        observacionesGenerales: ''
      },
      photos: []
      // {id, numero, note, fileName, mimeType, dataUrl, createdAt}
    };

    // Imagen pendiente en el modal (DataURL + metadatos)
    let pendingImage = null; // {dataUrl, fileName, mimeType}

    // ID de la foto en edición (null = modo añadir)
    let editingId = null;

    // ── Utilidades ─────────────────────────────────────────────────
    function toast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    function escapeHtml(str) {
      return (str ?? '')
        .toString()
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeXml(str) {
      return (str ?? '')
        .toString()
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&apos;');
    }

    function normalizeNumber(n) {
      const s = (n ?? '').toString().trim();
      if (!s) return '';
      if (/^\d+$/.test(s)) return String(Math.min(parseInt(s, 10), 999999)).padStart(3, '0');
      return s;
    }

    function nextAutoNumber() {
      const nums = state.photos
        .map(p => p.numero)
        .filter(n => /^\d+$/.test(n))
        .map(n => parseInt(n, 10));
      const max = nums.length ? Math.max(...nums) : 0;
      return String(max + 1).padStart(3, '0');
    }

    function safeId() {
      return `${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function formatFechaHora(isoString) {
      if (!isoString) return '';
      try {
        return new Date(isoString).toLocaleString('es-ES', {
          day: '2-digit', month: '2-digit', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      } catch (_) { return isoString; }
    }

    // ── Persistencia ───────────────────────────────────────────────
    function saveState() {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify(state));
      } catch (e) {
        toast('⚠️ No se pudo guardar: almacenamiento lleno');
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') {
          state.header = { ...state.header, ...(parsed.header || {}) };
          state.photos = Array.isArray(parsed.photos) ? parsed.photos : [];
        }
      } catch (_e) {}
    }

    // ── Render cabecera ────────────────────────────────────────────
    function renderHeader() {
      ['asunto','grupo','juzgado','procedimiento','fechaHora','direccion','observacionesGenerales']
        .forEach(id => { if ($(id)) $(id).value = state.header[id] || ''; });
    }

    // ── Render lista de fotos ──────────────────────────────────────
    function sortedPhotos() {
      return [...state.photos].sort((a, b) => {
        const an = /^\d+$/.test(a.numero) ? parseInt(a.numero, 10) : null;
        const bn = /^\d+$/.test(b.numero) ? parseInt(b.numero, 10) : null;
        if (an !== null && bn !== null) return an - bn;
        if (an !== null && bn === null) return -1;
        if (an === null && bn !== null) return 1;
        return (a.createdAt || 0) - (b.createdAt || 0);
      });
    }

    function renderList() {
      const list = $('list');
      list.innerHTML = '';
      $('count').textContent = `${state.photos.length} fotografía${state.photos.length === 1 ? '' : 's'}`;

      if (!state.photos.length) {
        $('empty').style.display = 'block';
        return;
      }
      $('empty').style.display = 'none';

      for (const photo of sortedPhotos()) {
        const item = document.createElement('article');
        item.className = 'photo-card';
        item.innerHTML = `
          <div class="photo-meta">
            <div>
              <div class="photo-number">FOTOGRAFÍA ${escapeHtml(photo.numero || '—')}</div>
              <div class="photo-filename">${escapeHtml(photo.fileName || 'imagen')}</div>
            </div>
            <div class="photo-actions">
              <button class="icon-btn" type="button" data-action="edit" data-id="${escapeHtml(photo.id)}" title="Editar">✏️ Editar</button>
              <button class="icon-btn danger" type="button" data-action="delete" data-id="${escapeHtml(photo.id)}" title="Eliminar">🗑️ Borrar</button>
            </div>
          </div>
          <div class="photo-image-wrap">
            ${photo.dataUrl
              ? `<img src="${photo.dataUrl}" alt="Fotografía ${escapeHtml(photo.numero || '')}" loading="lazy" />`
              : `<span style="color:var(--text-muted);font-size:.9rem;">Sin imagen</span>`}
          </div>
          ${photo.note ? `<p class="photo-note">${escapeHtml(photo.note)}</p>` : ''}
        `;
        list.appendChild(item);
      }

      // Delegar eventos en los botones de cada tarjeta
      list.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const action = e.currentTarget.dataset.action;
          const id = e.currentTarget.dataset.id;
          if (action === 'edit') openEditModal(id);
          if (action === 'delete') deletePhoto(id);
        });
      });
    }

    // ── Modal ──────────────────────────────────────────────────────
    function openAddModal() {
      editingId = null;
      pendingImage = null;
      $('modalTitle').textContent = 'Añadir fotografía';
      $('btnAddPhoto').textContent = 'Añadir';
      $('btnAddPhoto').dataset.mode = 'add';
      $('fotoNumero').value = nextAutoNumber();
      $('fotoNota').value = '';
      resetPreview();
      $('backdrop').classList.add('active');
      $('fotoNumero').focus();
    }

    function openEditModal(id) {
      const photo = state.photos.find(p => p.id === id);
      if (!photo) return;
      editingId = id;
      pendingImage = photo.dataUrl
        ? { dataUrl: photo.dataUrl, fileName: photo.fileName, mimeType: photo.mimeType }
        : null;
      $('modalTitle').textContent = 'Editar fotografía';
      $('btnAddPhoto').textContent = 'Guardar cambios';
      $('btnAddPhoto').dataset.mode = 'edit';
      $('fotoNumero').value = photo.numero || '';
      $('fotoNota').value = photo.note || '';
      if (photo.dataUrl) {
        showPreview(photo.dataUrl);
      } else {
        resetPreview();
      }
      $('backdrop').classList.add('active');
    }

    function closeModal() {
      $('backdrop').classList.remove('active');
      pendingImage = null;
      editingId = null;
    }

    function clearModalFields() {
      $('fotoNumero').value = editingId ? '' : nextAutoNumber();
      $('fotoNota').value = '';
      pendingImage = null;
      resetPreview();
    }

    function resetPreview() {
      const box = $('previewBox');
      box.innerHTML = '<div class="preview-placeholder" id="previewPlaceholder">Toma o selecciona una fotografía para ver la vista previa.</div>';
    }

    function showPreview(dataUrl) {
      const box = $('previewBox');
      box.innerHTML = `<img src="${dataUrl}" alt="Vista previa" />`;
    }

    // ── Leer archivo → DataURL ─────────────────────────────────────
    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        if (!file) return reject(new Error('Sin archivo'));
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = () => reject(new Error('Error al leer el archivo'));
        reader.readAsDataURL(file);
      });
    }

    // ── Añadir / guardar foto ──────────────────────────────────────
    async function handleAddPhoto() {
      const numero = normalizeNumber($('fotoNumero').value);
      const note   = $('fotoNota').value.trim();

      // Validar: necesitamos al menos número O imagen
      if (!numero && !pendingImage) {
        toast('⚠️ Indica un número de foto o añade una imagen.');
        return;
      }

      const mode = $('btnAddPhoto').dataset.mode;

      if (mode === 'edit' && editingId) {
        // Actualizar foto existente
        const idx = state.photos.findIndex(p => p.id === editingId);
        if (idx === -1) { toast('Error: foto no encontrada.'); return; }
        state.photos[idx].numero   = numero;
        state.photos[idx].note     = note;
        if (pendingImage) {
          state.photos[idx].dataUrl  = pendingImage.dataUrl;
          state.photos[idx].fileName = pendingImage.fileName;
          state.photos[idx].mimeType = pendingImage.mimeType;
        }
        saveState();
        renderList();
        closeModal();
        toast('✅ Fotografía actualizada.');
      } else {
        // Añadir nueva foto
        // Comprobar número duplicado
        if (numero && state.photos.some(p => p.numero === numero)) {
          toast(`⚠️ Ya existe una foto con el número ${numero}.`);
          return;
        }
        const photo = {
          id: safeId(),
          numero,
          note,
          dataUrl:   pendingImage ? pendingImage.dataUrl   : null,
          fileName:  pendingImage ? pendingImage.fileName  : '',
          mimeType:  pendingImage ? pendingImage.mimeType  : '',
          createdAt: Date.now()
        };
        state.photos.push(photo);
        saveState();
        renderList();
        closeModal();
        toast(`✅ Fotografía ${numero || '—'} añadida.`);
      }
    }

    // ── Eliminar foto ──────────────────────────────────────────────
    function deletePhoto(id) {
      const photo = state.photos.find(p => p.id === id);
      if (!photo) return;
      if (!confirm(`¿Eliminar la fotografía ${photo.numero || '—'}?`)) return;
      state.photos = state.photos.filter(p => p.id !== id);
      saveState();
      renderList();
      toast('🗑️ Fotografía eliminada.');
    }

    // ── Guardar cabecera ───────────────────────────────────────────
    function saveHeader() {
      ['asunto','grupo','juzgado','procedimiento','fechaHora','direccion','observacionesGenerales']
        .forEach(id => { state.header[id] = $(id) ? $(id).value.trim() : ''; });
      saveState();
      toast('✅ Datos guardados.');
    }

    // ── Reset completo ─────────────────────────────────────────────
    function resetAll() {
      if (!confirm('¿Borrar todos los datos y fotografías? Esta acción no se puede deshacer.')) return;
      state.photos = [];
      state.header = { asunto:'', grupo:'', juzgado:'', procedimiento:'', fechaHora:'', direccion:'', observacionesGenerales:'' };
      saveState();
      renderHeader();
      renderList();
      toast('🗑️ Todo borrado.');
    }

    // ── Exportar JSON ──────────────────────────────────────────────
    function exportJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      downloadBlob(blob, `reportaje_${sanitizeFilename(state.header.procedimiento || 'registro')}.json`);
      toast('📥 JSON exportado.');
    }

    // ── Exportar ODT ───────────────────────────────────────────────
    async function exportOdt() {
      if (!window.JSZip) { toast('⚠️ JSZip no disponible.'); return; }
      if (!state.photos.length) { toast('⚠️ No hay fotografías para exportar.'); return; }

      const zip = new JSZip();
      const sorted = sortedPhotos();
      const h = state.header;
      const imageFiles = {}; // filename → base64 data

      // Construir imágenes embebidas
      for (const p of sorted) {
        if (p.dataUrl) {
          const ext = (p.mimeType || 'image/jpeg').split('/')[1] || 'jpg';
          const fname = `foto_${p.numero || p.id}.${ext}`;
          imageFiles[fname] = p;
        }
      }

      // Manifest
      const manifest = [
        '<?xml version="1.0" encoding="UTF-8"?>',
        '<manifest:manifest xmlns:manifest="urn:oasis:names:tc:opendocument:xmlns:manifest:1.0" manifest:version="1.2">',
        ' <manifest:file-entry manifest:full-path="/" manifest:media-type="application/vnd.oasis.opendocument.text"/>',
        ' <manifest:file-entry manifest:full-path="content.xml" manifest:media-type="text/xml"/>',
        ' <manifest:file-entry manifest:full-path="styles.xml" manifest:media-type="text/xml"/>',
        ...Object.keys(imageFiles).map(fn => {
          const mime = imageFiles[fn].mimeType || 'image/jpeg';
          return ` <manifest:file-entry manifest:full-path="Pictures/${fn}" manifest:media-type="${mime}"/>`;
        }),
        '</manifest:manifest>'
      ].join('\n');

      // Styles
      const styles = `<?xml version="1.0" encoding="UTF-8"?>
<office:document-styles xmlns:office="urn:oasis:names:tc:opendocument:xmlns:office:1.0"
  xmlns:style="urn:oasis:names:tc:opendocument:xmlns:style:1.0"
  xmlns:fo="urn:oasis:names:tc:opendocument:xmlns:xsl-fo-compatible:1.0"
  office:version="1.2">
  <office:styles>
    <style:style style:name="Standard" style:family="paragraph" style:class="text">
      <style:text-properties fo:font-size="11pt"/>
    </style:style>
    <style:style style:name="Heading" style:family="paragraph" style:parent-style-name="Standard">
      <style:text-properties fo:font-size="14pt" fo:font-weight="bold" fo:color="#c8986b"/>
    </style:style>
    <style:style style:name="SubHeading" style:family="paragraph" style:parent-style-name="Standard">
      <style:text-properties fo:font-size="10pt" fo:font-weight="bold" fo:color="#555555"/>
    </style:style>
  </office:styles>
  <office:automatic-styles>
    <style:page-layout style:name="pm1">
      <style:page-layout-properties fo:margin-top="2cm" fo:margin-bottom="2cm"
        fo:margin-left="2cm" fo:margin-right="2cm"/>
    </style:page-layout>
  </office:automatic-styles>
  <office:master-styles>
    <style:master-page style:name="Standard" style:page-layout-name="pm1"/>
  </office:master-styles>
</office:document-styles>`;

      // Filas de 2 fotos
      function photoRow(left, right) {
        function cell(p) {
          if (!p) return '<table:table-cell/>'; 
          const ext = (p.mimeType || 'image/jpeg').split('/')[1] || 'jpg';
          const fname = `foto_${p.numero || p.id}.${ext}`;
          const imgTag = p.dataUrl
            ? `<draw:frame draw:name="${escapeXml(fname)}" svg:width="8cm" svg:height="6cm" text:anchor-type="paragraph">
                <draw:image xlink:href="Pictures/${escapeXml(fname)}" xlink:type="simple" xlink:show="embed" xlink:actuate="onLoad"/>
               </draw:frame>`
            : '';
          return `<table:table-cell>
            <text:p text:style-name="SubHeading">Fotografía ${escapeXml(p.numero || '—')}</text:p>
            <text:p>${imgTag}</text:p>
            <text:p>${escapeXml(p.note || '')}</text:p>
          </table:table-cell>`;
        }
        return `<table:table-row>${cell(left)}${cell(right)}</table:table-row>`;
      }

      let tableRows = '';
      for (let i = 0; i < sorted.length; i += 2) {
        tableRows += photoRow(sorted[i], sorted[i + 1] || null);
      }

      const content = `<?xml version="1.0" encoding="UTF-8"?>
<office:document-content
  xmlns:office="urn:oasis:names:tc:opendocument:xmlns:office:1.0"
  xmlns:text="urn:oasis:names:tc:opendocument:xmlns:text:1.0"
  xmlns:table="urn:oasis:names:tc:opendocument:xmlns:table:1.0"
  xmlns:draw="urn:oasis:names:tc:opendocument:xmlns:drawing:1.0"
  xmlns:svg="urn:oasis:names:tc:opendocument:xmlns:svg-compatible:1.0"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  xmlns:style="urn:oasis:names:tc:opendocument:xmlns:style:1.0"
  xmlns:fo="urn:oasis:names:tc:opendocument:xmlns:xsl-fo-compatible:1.0"
  office:version="1.2">
  <office:automatic-styles>
    <style:style style:name="Table1" style:family="table">
      <style:table-properties style:width="17cm" table:align="margins"/>
    </style:style>
    <style:style style:name="Table1.A" style:family="table-column">
      <style:table-column-properties style:column-width="8.5cm"/>
    </style:style>
    <style:style style:name="Table1.A1" style:family="table-cell">
      <style:table-cell-properties fo:padding="0.3cm" fo:border="0.05cm solid #c8986b"/>
    </style:style>
  </office:automatic-styles>
  <office:body>
    <office:text>
      <text:p text:style-name="Heading">REPORTAJE FOTOGRÁFICO DE REGISTRO</text:p>
      <text:p text:style-name="Standard"> </text:p>
      <text:p text:style-name="Standard"><text:span text:style-name="SubHeading">Asunto: </text:span>${escapeXml(h.asunto)}</text:p>
      <text:p text:style-name="Standard"><text:span text:style-name="SubHeading">Grupo: </text:span>${escapeXml(h.grupo)}</text:p>
      <text:p text:style-name="Standard"><text:span text:style-name="SubHeading">Juzgado: </text:span>${escapeXml(h.juzgado)}</text:p>
      <text:p text:style-name="Standard"><text:span text:style-name="SubHeading">Procedimiento: </text:span>${escapeXml(h.procedimiento)}</text:p>
      <text:p text:style-name="Standard"><text:span text:style-name="SubHeading">Fecha y hora: </text:span>${escapeXml(formatFechaHora(h.fechaHora))}</text:p>
      <text:p text:style-name="Standard"><text:span text:style-name="SubHeading">Dirección: </text:span>${escapeXml(h.direccion)}</text:p>
      ${h.observacionesGenerales ? `<text:p text:style-name="Standard"><text:span text:style-name="SubHeading">Observaciones: </text:span>${escapeXml(h.observacionesGenerales)}</text:p>` : ''}
      <text:p text:style-name="Standard"> </text:p>
      <table:table table:name="Fotografias" table:style-name="Table1">
        <table:table-column table:style-name="Table1.A" table:number-columns-repeated="2"/>
        ${tableRows}
      </table:table>
    </office:text>
  </office:body>
</office:document-content>`;

      zip.file('mimetype', 'application/vnd.oasis.opendocument.text', { compression: 'STORE' });
      zip.folder('META-INF').file('manifest.xml', manifest);
      zip.file('content.xml', content);
      zip.file('styles.xml', styles);

      const picsFolder = zip.folder('Pictures');
      for (const [fname, p] of Object.entries(imageFiles)) {
        if (p.dataUrl) {
          const base64 = p.dataUrl.split(',')[1];
          picsFolder.file(fname, base64, { base64: true });
        }
      }

      const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.oasis.opendocument.text' });
      downloadBlob(blob, `reportaje_${sanitizeFilename(h.procedimiento || 'registro')}.odt`);
      toast('📄 ODT exportado.');
    }

    // ── Exportar PDF ───────────────────────────────────────────────
    async function exportPdf() {
      if (!window.jspdf) { toast('⚠️ jsPDF no disponible.'); return; }
      if (!state.photos.length) { toast('⚠️ No hay fotografías para exportar.'); return; }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const h = state.header;
      const sorted = sortedPhotos();

      const pageW = 210, pageH = 297;
      const margin = 15;
      const colW = (pageW - margin * 2 - 8) / 2;
      const rowH = 85; // altura de cada celda de foto
      const photosPerPage = 4;

      // Cabecera en la primera página
      doc.setFontSize(14);
      doc.setTextColor(200, 152, 107);
      doc.text('REPORTAJE FOTOGRÁFICO DE REGISTRO', margin, margin + 6);

      doc.setFontSize(9);
      doc.setTextColor(80, 80, 80);
      let yMeta = margin + 14;
      const metaLines = [
        h.asunto       && `Asunto: ${h.asunto}`,
        h.grupo        && `Grupo: ${h.grupo}`,
        h.juzgado      && `Juzgado: ${h.juzgado}`,
        h.procedimiento && `Procedimiento: ${h.procedimiento}`,
        h.fechaHora    && `Fecha y hora: ${formatFechaHora(h.fechaHora)}`,
        h.direccion    && `Dirección: ${h.direccion}`,
        h.observacionesGenerales && `Observaciones: ${h.observacionesGenerales}`
      ].filter(Boolean);

      for (const line of metaLines) {
        doc.text(line, margin, yMeta);
        yMeta += 5;
      }

      let yStart = yMeta + 6;

      for (let i = 0; i < sorted.length; i++) {
        const col = i % 2;            // 0 = izquierda, 1 = derecha
        const row = Math.floor(i / 2); // fila dentro de la página actual
        const pageRow = row % 2;       // 0 o 1 dentro de una página

        // Nueva página cada 4 fotos (excepto la primera)
        if (i > 0 && i % photosPerPage === 0) {
          doc.addPage();
          yStart = margin;
        }

        const x = margin + col * (colW + 8);
        const y = (i === 0 ? yStart : margin) + pageRow * (rowH + 6);

        // Compensar que las primeras 2 fotos van después de la cabecera
        const yActual = i < 2 ? yStart + Math.floor(i / 2) * (rowH + 6) + (col === 0 ? 0 : 0) : margin + pageRow * (rowH + 6);
        // Simplificamos: recalcular correctamente
        const pageIndex = Math.floor(i / photosPerPage);
        const posInPage = i % photosPerPage;
        const pRow = Math.floor(posInPage / 2);
        const pCol = posInPage % 2;
        const xPos = margin + pCol * (colW + 8);
        const yPos = (pageIndex === 0 ? yStart : margin) + pRow * (rowH + 6);

        const p = sorted[i];
        doc.setDrawColor(200, 152, 107);
        doc.setLineWidth(0.3);
        doc.rect(xPos, yPos, colW, rowH);

        doc.setFontSize(7);
        doc.setTextColor(200, 152, 107);
        doc.text(`FOTO ${p.numero || '—'}`, xPos + 2, yPos + 5);

        if (p.dataUrl) {
          try {
            const imgType = (p.mimeType || 'image/jpeg').split('/')[1].toUpperCase();
            const safeType = ['JPEG','JPG','PNG','WEBP'].includes(imgType) ? imgType : 'JPEG';
            doc.addImage(p.dataUrl, safeType === 'JPG' ? 'JPEG' : safeType, xPos + 1, yPos + 7, colW - 2, rowH - 22);
          } catch (_) { /* imagen no soportada */ }
        }

        if (p.note) {
          doc.setFontSize(7);
          doc.setTextColor(50, 50, 50);
          const lines = doc.splitTextToSize(p.note, colW - 4);
          doc.text(lines.slice(0, 3), xPos + 2, yPos + rowH - 12);
        }
      }

      doc.save(`reportaje_${sanitizeFilename(h.procedimiento || 'registro')}.pdf`);
      toast('📄 PDF exportado.');
    }

    // ── Descarga genérica ──────────────────────────────────────────
    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 2000);
    }

    function sanitizeFilename(str) {
      return (str || 'export').replace(/[^a-zA-Z0-9_\-áéíóúÁÉÍÓÚñÑ]/g, '_').slice(0, 60);
    }

    // ── Event listeners ────────────────────────────────────────────
    $('btnOpenModal').addEventListener('click', openAddModal);
    $('btnCloseModal').addEventListener('click', closeModal);
    $('btnClearFields').addEventListener('click', clearModalFields);
    $('btnAddPhoto').addEventListener('click', handleAddPhoto);
    $('btnGuardarCabecera').addEventListener('click', saveHeader);
    $('btnResetAll').addEventListener('click', resetAll);
    $('btnExportJson').addEventListener('click', exportJson);
    $('btnExportOdt').addEventListener('click', exportOdt);
    $('btnExportPdf').addEventListener('click', exportPdf);

    // Cerrar modal al pulsar el fondo
    $('backdrop').addEventListener('click', (e) => {
      if (e.target === $('backdrop')) closeModal();
    });

    // Cerrar modal con Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && $('backdrop').classList.contains('active')) closeModal();
    });

    // Botón "Cámara" → abre input con capture=environment
    $('btnSolicitarCamara').addEventListener('click', () => {
      const inp = $('fotoArchivo');
      inp.setAttribute('capture', 'environment');
      inp.click();
    });

    // Botón "Galería / archivo" → abre input sin capture
    $('btnSeleccionarArchivo').addEventListener('click', () => {
      const inp = $('fotoArchivo');
      inp.removeAttribute('capture');
      inp.click();
    });

    // FIX PRINCIPAL: manejar el cambio del input de archivo
    $('fotoArchivo').addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      try {
        const dataUrl = await readFileAsDataUrl(file);
        pendingImage = {
          dataUrl,
          fileName: file.name,
          mimeType: file.type || 'image/jpeg'
        };
        showPreview(dataUrl);
        // Si no hay número aún, asignar automático
        if (!$('fotoNumero').value.trim()) {
          $('fotoNumero').value = nextAutoNumber();
        }
      } catch (err) {
        toast('⚠️ No se pudo cargar la imagen.');
        console.error(err);
      }
      // Reset el input para permitir seleccionar la misma foto dos veces
      e.target.value = '';
    });

    // ── Arranque ───────────────────────────────────────────────────
    loadState();
    renderHeader();
    renderList();
  </script>
</body>
</html>
