<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro · Reportaje Fotográfico</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1a1a2e;
      --secondary: #16213e;
      --accent: #c8986b;
      --accent-light: #d4ab7f;
      --text-light: #f5f5f5;
      --text-muted: #a0a0a0;
      --surface: #0f0f1e;
      --border: rgba(200, 152, 107, 0.2);
      --shadow: rgba(0, 0, 0, 0.4);
      --danger: rgba(255,120,120,.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Crimson Pro', serif;
      background: linear-gradient(135deg, var(--surface) 0%, var(--primary) 100%);
      color: var(--text-light);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.55;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .info-card {
      background: rgba(22, 33, 62, 0.62);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 8px 32px var(--shadow);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 720px){
      .grid { grid-template-columns: 1fr 1fr; }
      .span2 { grid-column: 1 / -1; }
    }

    .form-group { margin-bottom: 0; }

    .form-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      display: block;
      font-weight: 500;
    }

    .form-input,
    .form-textarea,
    .form-file {
      width: 100%;
      padding: 14px 16px;
      background: rgba(15, 15, 30, 0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-light);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-file { padding: 12px 14px; }

    .form-input:focus,
    .form-textarea:focus,
    .form-file:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 152, 107, 0.1);
    }

    .form-textarea { min-height: 120px; resize: vertical; }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn-add,
    .btn-export,
    .btn-danger {
      padding: 15px 18px;
      border-radius: 12px;
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      min-height: 52px;
      flex: 1;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: var(--primary);
      box-shadow: 0 4px 20px rgba(200, 152, 107, 0.28);
      text-transform: uppercase;
    }

    .btn-export {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-light);
      border: 1px solid var(--border);
      text-transform: uppercase;
    }

    .btn-danger {
      background: rgba(255,255,255,.05);
      color: var(--text-light);
      border: 1px solid rgba(255,120,120,.28);
      text-transform: uppercase;
    }

    .btn-add:hover,
    .btn-export:hover,
    .btn-danger:hover,
    .icon-btn:hover,
    .btn:hover {
      transform: translateY(-2px);
    }

    .photos-section { margin-top: 26px; }

    .photos-title {
      font-size: 1.45rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .evidence-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      background: rgba(200, 152, 107, 0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
      color: var(--text-light);
      white-space: nowrap;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 720px){
      .photo-grid { grid-template-columns: 1fr 1fr; }
    }

    .photo-card {
      background: rgba(22, 33, 62, 0.4);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .photo-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .photo-number {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .photo-image-wrap {
      background: rgba(0,0,0,.22);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,.06);
    }

    .photo-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-note {
      color: var(--text-light);
      font-size: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
      padding-top: 4px;
    }

    .photo-filename {
      color: var(--text-muted);
      font-size: .95rem;
    }

    .photo-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .icon-btn, .btn {
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-family: inherit;
      font-size: .95rem;
    }

    .icon-btn.danger { border-color: rgba(255,120,120,.25); }
    .icon-btn.danger:hover { background: rgba(255,120,120,.12); }

    .empty-state {
      text-align: center;
      padding: 46px 16px;
      color: var(--text-muted);
      font-style: italic;
      border: 1px dashed rgba(200, 152, 107, 0.25);
      border-radius: 14px;
      background: rgba(22,33,62,0.25);
    }

    .empty-state svg {
      width: 72px;
      height: 72px;
      margin-bottom: 14px;
      opacity: 0.25;
      display:block;
      margin-left:auto;
      margin-right:auto;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      padding: 16px;
    }

    .modal-overlay.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .modal {
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      margin-top: 12px;
      max-height: calc(100dvh - 24px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .modal h2 {
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--accent);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
      position: sticky;
      bottom: 0;
      background: var(--secondary);
      padding-top: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      z-index: 5;
    }

    .hint {
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .preview-box {
      margin-top: 10px;
      background: rgba(0,0,0,.18);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.05);
      min-height: 140px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 280px;
      border-radius: 10px;
      display: block;
    }

    .preview-placeholder { color: var(--text-muted); text-align:center; }

    .capture-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .camera-box {
      margin-top: 10px;
      background: rgba(0,0,0,.18);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.05);
      display: none;
      gap: 10px;
      flex-direction: column;
    }

    .camera-box.active { display: flex; }

    .camera-video {
      width: 100%;
      max-height: 320px;
      background: #000;
      border-radius: 10px;
      object-fit: cover;
    }

    .camera-note {
      font-family: 'DM Mono', monospace;
      font-size: 0.76rem;
      color: var(--text-muted);
    }


    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.75);
      border: 1px solid var(--border);
      color: var(--text-light);
      padding: 10px 14px;
      border-radius: 999px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      display: none;
      z-index: 2000;
      max-width: calc(100% - 28px);
      text-align: center;
    }

    .toast.show { display:block; }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .button-group, .modal-buttons { flex-direction: column; }
      .btn-add, .btn-export, .btn-danger, .btn { width: 100%; }
      .modal { padding: 20px; }
      .form-textarea { min-height: 90px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Reportaje Fotográfico de Registro</h1>
      <div class="subtitle">Captura, organiza y exporta a ODT o PDF · 2 columnas · 4 fotos por página</div>
    </div>

    <section class="info-card" aria-label="Datos del registro">
      <div class="grid">
        <div class="form-group">
          <label class="form-label" for="asunto">Asunto</label>
          <input class="form-input" id="asunto" placeholder="Ej: Entrada y registro en domicilio" />
        </div>
        <div class="form-group">
          <label class="form-label" for="grupo">Grupo de Investigación</label>
          <input class="form-input" id="grupo" placeholder="Ej: Grupo / Unidad" />
        </div>
        <div class="form-group">
          <label class="form-label" for="juzgado">Juzgado</label>
          <input class="form-input" id="juzgado" placeholder="Ej: J. Instrucción nº..." />
        </div>
        <div class="form-group">
          <label class="form-label" for="procedimiento">Procedimiento</label>
          <input class="form-input" id="procedimiento" placeholder="Ej: DP 123/2026" />
        </div>
        <div class="form-group">
          <label class="form-label" for="fechaHora">Fecha y hora del registro</label>
          <input class="form-input" id="fechaHora" type="datetime-local" />
        </div>
        <div class="form-group span2">
          <label class="form-label" for="direccion">Dirección</label>
          <input class="form-input" id="direccion" placeholder="C/ ..., nº..., localidad" />
        </div>
        <div class="form-group span2">
          <label class="form-label" for="observacionesGenerales">Observaciones generales</label>
          <textarea class="form-textarea" id="observacionesGenerales" placeholder="Observaciones generales del reportaje o del registro."></textarea>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-add" id="btnGuardarCabecera" type="button">Guardar datos</button>
        <button class="btn-danger" id="btnResetAll" type="button">Borrar todo</button>
      </div>
    </section>

    <div class="button-group">
      <button class="btn-add" id="btnOpenModal" type="button">Añadir fotografía</button>
      <button class="btn-export" id="btnExportJson" type="button">Exportar JSON</button>
      <button class="btn-export" id="btnExportOdt" type="button">Exportar ODT</button>
      <button class="btn-export" id="btnExportPdf" type="button">Exportar PDF</button>
    </div>

    <section class="photos-section">
      <div class="photos-title">
        <span>Fotografías</span>
        <span class="evidence-count" id="count">0 fotografías</span>
      </div>

      <div id="list" class="photo-grid"></div>

      <div id="empty" class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7h4l2-2h4l2 2h4v12H4V7z" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="13" r="3.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Aún no has añadido fotografías. Pulsa “Añadir fotografía”.
      </div>
    </section>
  </div>

  <div class="modal-overlay" id="backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h2 id="modalTitle">Añadir fotografía</h2>

      <div class="form-group">
        <label class="form-label" for="fotoNumero">Nº de foto</label>
        <input class="form-input" id="fotoNumero" inputmode="numeric" placeholder="Ej: 001" />
      </div>

      <div class="form-group">
        <label class="form-label">Imagen</label>
        <button class="btn-add" id="btnSolicitarCamara" type="button" style="width:100%;margin-bottom:10px;">📷 Abrir cámara</button>
      </div>

      <div class="camera-box" id="cameraBox">
        <video class="camera-video" id="cameraVideo" autoplay playsinline muted></video>
        <button class="btn-add" id="btnCapturar" type="button" style="margin-top:8px;" disabled>Tomar foto</button>
      </div>

      <div class="preview-box" id="previewBox">
        <div class="preview-placeholder">Abre la cámara y toma una foto.</div>
      </div>

      <div class="form-group" style="margin-top:12px;">
        <label class="form-label" for="fotoNota">Nota / pie de foto</label>
        <textarea class="form-textarea" id="fotoNota" placeholder="Ej: Vista general del salón a la entrada. Se aprecia mesa principal y equipo informático al fondo."></textarea>
      </div>

      <div class="modal-buttons">
        <button class="btn btn-add" id="btnAddPhoto" type="button" data-mode="add">Añadir</button>
        <button class="btn btn-secondary" id="btnClearFields" type="button">Limpiar</button>
        <button class="btn btn-secondary" id="btnCloseModal" type="button">Cerrar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script>
    const LS_KEY = 'reportaje_fotografico_registro_v1';
    const $ = (id) => document.getElementById(id);

    const state = {
      header: {
        asunto: '',
        grupo: '',
        juzgado: '',
        procedimiento: '',
        fechaHora: '',
        direccion: '',
        observacionesGenerales: ''
      },
      photos: []
      // {id, numero, note, fileName, mimeType, dataUrl, createdAt, source}
    };

    function toast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => t.classList.remove('show'), 1800);
    }

    function escapeHtml(str) {
      return (str ?? '')
        .toString()
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeXml(str) {
      return (str ?? '')
        .toString()
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&apos;');
    }

    function normalizeNumber(n) {
      const s = (n ?? '').toString().trim();
      if (!s) return '';
      if (/^\d+$/.test(s)) return String(Math.min(parseInt(s, 10), 999999)).padStart(3, '0');
      return s;
    }

    function nextAutoNumber() {
      const nums = state.photos
        .map(p => p.numero)
        .filter(n => /^\d+$/.test(n))
        .map(n => parseInt(n, 10));
      const max = nums.length ? Math.max(...nums) : 0;
      return String(max + 1).padStart(3, '0');
    }

    function safeId() {
      return `${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function saveState() {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') {
          state.header = { ...state.header, ...(parsed.header || {}) };
          state.photos = Array.isArray(parsed.photos) ? parsed.photos : [];
        }
      } catch (_e) {}
    }

    function renderHeader() {
      ['asunto','grupo','juzgado','procedimiento','fechaHora','direccion','observacionesGenerales'].forEach(id => {
        if ($(id)) $(id).value = state.header[id] || '';
      });
    }

    function sortedPhotos() {
      return [...state.photos].sort((a, b) => {
        const an = /^\d+$/.test(a.numero) ? parseInt(a.numero, 10) : null;
        const bn = /^\d+$/.test(b.numero) ? parseInt(b.numero, 10) : null;
        if (an !== null && bn !== null) return an - bn;
        if (an !== null && bn === null) return -1;
        if (an === null && bn !== null) return 1;
        return (a.createdAt || 0) - (b.createdAt || 0);
      });
    }

    function renderList() {
      const list = $('list');
      list.innerHTML = '';
      $('count').textContent = `${state.photos.length} fotografía${state.photos.length === 1 ? '' : 's'}`;

      if (!state.photos.length) {
        $('empty').style.display = 'block';
        return;
      }
      $('empty').style.display = 'none';

      for (const photo of sortedPhotos()) {
        const item = document.createElement('article');
        item.className = 'photo-card';
        item.innerHTML = `
          <div class="photo-meta">
            <div>
              <div class="photo-number">FOTOGRAFÍA ${escapeHtml(photo.numero || '—')}</div>
              <div class="photo-filename">${escapeHtml(photo.fileName || 'imagen')}</div>
            </div>
            <div class="photo-actions">
              <button class="icon-btn" type="button" data-action="edit" data-id="${escapeHtml(photo.id)}">Editar</button>
              <button class="icon-btn danger" type="button" data-action="del" data-id="${escapeHtml(photo.id)}">Borrar</button>
            </div>
          </div>
          <div class="photo-image-wrap">
            <img src="${photo.dataUrl}" alt="Fotografía ${escapeHtml(photo.numero || '')}">
          </div>
          <div class="photo-note">${escapeHtml(photo.note || '')}</div>
        `;
        list.appendChild(item);
      }
    }

    function saveHeaderFromInputs() {
      ['asunto','grupo','juzgado','procedimiento','fechaHora','direccion','observacionesGenerales'].forEach(id => {
        state.header[id] = ($(id).value || '').trim();
      });
      saveState();
      toast('Datos guardados');
    }

    function resetAll() {
      if (!confirm('¿Borrar todos los datos y fotografías guardadas?')) return;
      localStorage.removeItem(LS_KEY);
      state.header = { asunto:'', grupo:'', juzgado:'', procedimiento:'', fechaHora:'', direccion:'', observacionesGenerales:'' };
      state.photos = [];
      renderHeader();
      renderList();
      toast('Borrado completo');
    }

    function setPreview(dataUrl) {
      const box = $('previewBox');
      if (!dataUrl) {
        box.innerHTML = '<div class="preview-placeholder">La vista previa aparecerá aquí.</div>';
        return;
      }
      box.innerHTML = `<img src="${dataUrl}" alt="Vista previa">`;
    }

    function clearModalFields() {
      $('fotoNumero').value = '';
      $('fotoNota').value = '';
      capturedDataUrl = '';
      capturedMimeType = 'image/jpeg';
      capturedFileName = '';
      stopCamera();
      setPreview('');
      setTimeout(() => $('fotoNumero')?.focus(), 50);
    }

    function openModal(mode, id = null) {
      const backdrop = $('backdrop');
      const title = $('modalTitle');
      const btn = $('btnAddPhoto');
      backdrop.classList.add('active');

      if (mode === 'edit') {
        const photo = state.photos.find(p => p.id === id);
        if (!photo) {
          toast('No se encontró la fotografía.');
          return closeModal();
        }
        title.textContent = 'Editar fotografía';
        btn.textContent = 'Guardar';
        btn.dataset.mode = 'edit';
        btn.dataset.editId = photo.id;
        $('fotoNumero').value = photo.numero || '';
        $('fotoNota').value = photo.note || '';
        $('fotoArchivo').value = '';
        $('fotoArchivo').dataset.existingDataUrl = photo.dataUrl || '';
        $('fotoArchivo').dataset.existingMimeType = photo.mimeType || '';
        $('fotoArchivo').dataset.existingFileName = photo.fileName || '';
        setPreview(photo.dataUrl || '');
      } else {
        title.textContent = 'Añadir fotografía';
        btn.textContent = 'Añadir';
        btn.dataset.mode = 'add';
        delete btn.dataset.editId;
        clearModalFields();
      }

      setTimeout(() => $('fotoNumero')?.focus?.(), 50);
    }

    function closeModal() {
      $('backdrop').classList.remove('active');
      stopCamera();
    }

    let cameraStream = null;
    let capturedDataUrl = '';
    let capturedMimeType = 'image/jpeg';
    let capturedFileName = '';

    function setCameraStatus(_msg) {} // removed

    async function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      const video = $('cameraVideo');
      if (video) video.srcObject = null;
      $('cameraBox')?.classList.remove('active');
      const btn = $('btnCapturar');
      if (btn) btn.disabled = true;
    }

    async function startCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        toast('Este navegador no permite acceso a la cámara.');
        return;
      }
      try {
        await stopCamera();
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        });
        const video = $('cameraVideo');
        video.srcObject = cameraStream;
        $('cameraBox').classList.add('active');
        video.onloadedmetadata = () => {
          const btn = $('btnCapturar');
          if (btn) btn.disabled = false;
        };
      } catch (err) {
        const reason = err.name === 'NotAllowedError' ? 'Permiso denegado para la cámara.'
          : err.name === 'NotFoundError' ? 'No se detectó ninguna cámara.'
          : 'No se pudo iniciar la cámara.';
        toast(reason);
      }
    }

    async function captureFromCamera() {
      const video = $('cameraVideo');
      if (!cameraStream || !video?.videoWidth) {
        toast('La cámara todavía no está lista.');
        return;
      }
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      capturedDataUrl = canvas.toDataURL('image/jpeg', 0.92);
      capturedMimeType = 'image/jpeg';
      capturedFileName = `captura_${new Date().toISOString().replace(/[:.]/g, '-')}.jpg`;
      setPreview(capturedDataUrl);
      await stopCamera();
      toast('Fotografía capturada — añade un pie y pulsa Añadir');
    }

    async function addPhoto() {
      let numero = normalizeNumber($('fotoNumero').value);
      const note = ($('fotoNota').value || '').trim();

      if (!capturedDataUrl) {
        toast('Primero abre la cámara y toma una fotografía.');
        return;
      }
      if (!note) {
        toast('Añade una nota o pie de foto.');
        $('fotoNota').focus();
        return;
      }
      if (!numero) numero = nextAutoNumber();

      const dup = state.photos.find(p => (p.numero || '') === numero);
      if (dup) {
        toast(`Ya existe la fotografía ${numero}.`);
        $('fotoNumero').focus();
        return;
      }

      state.photos.push({
        id: safeId(),
        numero,
        note,
        fileName: capturedFileName || `captura_${numero}.jpg`,
        mimeType: capturedMimeType,
        dataUrl: capturedDataUrl,
        createdAt: Date.now(),
        source: 'camera'
      });

      saveState();
      renderList();
      closeModal();
      clearModalFields();
      toast('Fotografía añadida');
    }

    async function editPhoto(editId) {
      let numero = normalizeNumber($('fotoNumero').value);
      const note = ($('fotoNota').value || '').trim();
      const photo = state.photos.find(p => p.id === editId);

      if (!photo) { toast('No se encontró la fotografía.'); return; }
      if (!note) { toast('Añade una nota o pie de foto.'); $('fotoNota').focus(); return; }
      if (!numero) numero = photo.numero || nextAutoNumber();

      const dup = state.photos.find(p => p.id !== editId && (p.numero || '') === numero);
      if (dup) { toast(`Ya existe la fotografía ${numero}.`); $('fotoNumero').focus(); return; }

      if (capturedDataUrl) {
        photo.dataUrl = capturedDataUrl;
        photo.mimeType = capturedMimeType;
        photo.fileName = capturedFileName || photo.fileName;
      }
      photo.numero = numero;
      photo.note = note;

      saveState();
      renderList();
      closeModal();
      clearModalFields();
      toast('Cambios guardados');
    }

    function deletePhoto(id) {
      const photo = state.photos.find(p => p.id === id);
      const label = photo?.numero ? `Fotografía ${photo.numero}` : 'esta fotografía';
      if (!confirm(`¿Borrar ${label}?`)) return;
      state.photos = state.photos.filter(p => p.id !== id);
      saveState();
      renderList();
      toast('Fotografía borrada');
    }

    function buildExportObject() {
      return {
        header: structuredClone(state.header),
        photos: sortedPhotos().map(p => ({ ...p }))
      };
    }

    function downloadBlob(filename, blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportJSON() {
      const blob = new Blob([JSON.stringify(buildExportObject(), null, 2)], { type: 'application/json;charset=utf-8' });
      downloadBlob('reportaje_fotografico_registro.json', blob);
      toast('JSON exportado');
    }

    function dataUrlToUint8Array(dataUrl) {
      const base64 = dataUrl.split(',')[1] || '';
      const binary = atob(base64);
      const len = binary.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function extensionFromMime(mime) {
      const map = {
        'image/jpeg': 'jpg',
        'image/jpg': 'jpg',
        'image/png': 'png',
        'image/webp': 'webp',
        'image/gif': 'gif',
        'image/bmp': 'bmp'
      };
      return map[(mime || '').toLowerCase()] || 'jpg';
    }

    function xmlParagraph(text, style = 'P1') {
      return `<text:p text:style-name="${style}">${escapeXml(text || '')}</text:p>`;
    }

    async function exportODT() {
      if (!window.JSZip) { toast('No se pudo cargar JSZip.'); return; }
      const obj = buildExportObject();
      if (!obj.photos.length) { toast('No hay fotografías para exportar.'); return; }
      toast('Generando ODT…');

      // Pre-load image dimensions
      await Promise.all(obj.photos.map(p => loadImgDims(p)));

      const zip = new JSZip();
      zip.file('mimetype', 'application/vnd.oasis.opendocument.text', { compression: 'STORE' });

      const picsFolder = zip.folder('Pictures');
      obj.photos.forEach((photo, idx) => {
        const ext = extensionFromMime(photo.mimeType);
        photo._internalName = `photo_${String(idx + 1).padStart(3, '0')}.${ext}`;
        picsFolder.file(photo._internalName, dataUrlToUint8Array(photo.dataUrl));
      });

      zip.folder('META-INF').file('manifest.xml', buildManifestXml(obj.photos));
      zip.file('styles.xml', buildStylesXml());
      zip.file('meta.xml', buildMetaXml());
      zip.file('settings.xml', buildSettingsXml());
      zip.file('content.xml', buildContentXml(obj));

      const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.oasis.opendocument.text' });
      downloadBlob('reportaje_fotografico_registro.odt', blob);
      toast('ODT exportado');
    }

    // ── helpers ──────────────────────────────────────────────────────────────

    function loadImgDims(photo) {
      if (photo._w && photo._h) return Promise.resolve();
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => { photo._w = img.naturalWidth; photo._h = img.naturalHeight; resolve(); };
        img.onerror = () => { photo._w = 4; photo._h = 3; resolve(); };
        img.src = photo.dataUrl;
      });
    }

    // For ODT: given fixed height (cm), compute width respecting aspect ratio, capped at maxW
    function fitToCellOdt(photo, fixedH_cm, maxW_cm) {
      const ratio = (photo._w && photo._h) ? photo._w / photo._h : 4 / 3;
      const w = Math.min(parseFloat((fixedH_cm * ratio).toFixed(3)), maxW_cm);
      return { w: w.toFixed(3), h: fixedH_cm.toFixed(3) };
    }

    // ── ODT builders ─────────────────────────────────────────────────────────

    function buildManifestXml(photos) {
      const files = photos.map(p =>
        `\n  <manifest:file-entry manifest:media-type="${escapeXml(p.mimeType || 'image/jpeg')}" manifest:full-path="Pictures/${escapeXml(p._internalName || '')}"/>`
      ).join('');
      return `<?xml version="1.0" encoding="UTF-8"?>
<manifest:manifest xmlns:manifest="urn:oasis:names:tc:opendocument:xmlns:manifest:1.0" manifest:version="1.2">
  <manifest:file-entry manifest:media-type="application/vnd.oasis.opendocument.text" manifest:full-path="/"/>
  <manifest:file-entry manifest:media-type="text/xml" manifest:full-path="content.xml"/>
  <manifest:file-entry manifest:media-type="text/xml" manifest:full-path="styles.xml"/>
  <manifest:file-entry manifest:media-type="text/xml" manifest:full-path="meta.xml"/>
  <manifest:file-entry manifest:media-type="text/xml" manifest:full-path="settings.xml"/>${files}
</manifest:manifest>`;
    }

      return `<?xml version="1.0" encoding="UTF-8"?>

        </text:p>
      </style:header>

<office:document-meta xmlns:office="urn:oasis:names:tc:opendocument:xmlns:office:1.0"

    function buildHeaderLinesOdt(header) {
      const rows = [];
      const addRow = (label, value) => {
        if (!value) return;
        rows.push(`
        <table:table-row>
          <table:table-cell table:style-name="HdrCellLabel" office:value-type="string">
            <text:p text:style-name="PHdrLabel">${escapeXml(label)}</text:p>
          </table:table-cell>
          <table:table-cell table:style-name="HdrCellValue" office:value-type="string">
            <text:p text:style-name="PHdrValue">${escapeXml(value)}</text:p>
          </table:table-cell>
        </table:table-row>`);
      };
      addRow('Asunto', header.asunto);
      addRow('Grupo de Investigación', header.grupo);
      addRow('Juzgado', header.juzgado);
      addRow('Procedimiento', header.procedimiento);
      addRow('Fecha y hora del registro', header.fechaHora);
      addRow('Dirección', header.direccion);
      if (header.observacionesGenerales) {
        rows.push(`
        <table:table-row>
          <table:table-cell table:style-name="HdrCellLabel" office:value-type="string">
            <text:p text:style-name="PHdrLabel">Observaciones generales</text:p>
          </table:table-cell>
          <table:table-cell table:style-name="HdrCellValue" office:value-type="string">
            <text:p text:style-name="PHdrValue">${escapeXml(header.observacionesGenerales)}</text:p>
          </table:table-cell>
        </table:table-row>`);
      }
      if (!rows.length) return '';
      return `
      <table:table table:name="TablaCabecera" table:style-name="HdrTable">
        <table:table-column table:style-name="HdrColLabel"/>
        <table:table-column table:style-name="HdrColValue"/>
        ${rows.join('')}
      </table:table>`;
    }

    // Fixed image height (cm) per cell; 4 photos fill the page height leaving room for captions
    const ODT_IMG_H = 5.8; // cm — 2 rows × (5.8cm img + ~1.4cm caption+padding) ≈ 29.4cm body
    const ODT_COL_W = 8.3; // cm — half of 17cm usable, with gap

    function photoCellXml(photo, globalIdx) {
      const picturePath = `Pictures/${photo._internalName}`;
      const dims = fitToCellOdt(photo, ODT_IMG_H, ODT_COL_W - 0.2);
      const numero = escapeXml(photo.numero || String(globalIdx + 1).padStart(3, '0'));
      const note = escapeXml(photo.note || '');
      return `<table:table-cell table:style-name="PhotoCell" office:value-type="string">
          <text:p text:style-name="PPhotoNum">Fotografía ${numero}</text:p>
          <text:p text:style-name="PImgPara">
            <draw:frame draw:style-name="ImgFrame" draw:name="Foto_${globalIdx + 1}"
              text:anchor-type="paragraph"
              svg:width="${dims.w}cm" svg:height="${dims.h}cm">
              <draw:image xlink:href="${escapeXml(picturePath)}"
                xlink:type="simple" xlink:show="embed" xlink:actuate="onLoad"/>
            </draw:frame>
          </text:p>
          <text:p text:style-name="PCaption">${note}</text:p>
        </table:table-cell>`;
    }

    function buildPhotoTableXml(photos) {
      const chunks = [];
      for (let i = 0; i < photos.length; i += 4) {
        const block = photos.slice(i, i + 4);
        const c = (j) => block[j] ? photoCellXml(block[j], i + j) : '<table:table-cell table:style-name="PhotoCell"><text:p text:style-name="PCaption"/></table:table-cell>';
        chunks.push(`
      <table:table table:name="TablaFotos${Math.floor(i / 4) + 1}" table:style-name="PhotoTable">
        <table:table-column table:style-name="PhotoCol"/>
        <table:table-column table:style-name="PhotoCol"/>
        <table:table-row table:style-name="PhotoRow">
          ${c(0)}
          ${c(1)}
        </table:table-row>
        <table:table-row table:style-name="PhotoRow">
          ${c(2)}
          ${c(3)}
        </table:table-row>
      </table:table>`);
        if (i + 4 < photos.length) chunks.push('<text:p text:style-name="PPageBreak"/>');
      }
      return chunks.join('\n');
    }

      <style:table-row-properties style:min-row-height="7cm"/>
    </style:style>
    <style:style style:name="PhotoCell" style:family="table-cell">
      <style:table-cell-properties fo:padding="0.25cm"
        fo:border="0.04cm solid #e5e7eb" fo:background-color="#ffffff"/>
    </style:style>

    <!-- ── Graphic frame ── -->
    <style:style style:name="ImgFrame" style:family="graphic">
      <style:graphic-properties
        fo:margin-left="0cm" fo:margin-right="0cm"
        fo:margin-top="0cm" fo:margin-bottom="0cm"
        style:vertical-pos="top" style:vertical-rel="paragraph"
        style:horizontal-pos="left" style:horizontal-rel="paragraph"
        draw:stroke="solid" svg:stroke-width="0.02cm" svg:stroke-color="#d1d5db"
        draw:fill="none"/>
    </style:style>

  </office:automatic-styles>
  <office:body>
    <office:text>

      <!-- ══ COVER HEADER ══ -->
      <text:p text:style-name="PTitleBig">Reportaje fotográfico del registro</text:p>
      <text:p text:style-name="PTitleSub">Documento generado el ${escapeXml(new Date().toLocaleString('es-ES'))}</text:p>
      <text:p text:style-name="PHdrLine"/>

      <!-- ══ INFO TABLE ══ -->
      ${buildHeaderLinesOdt(obj.header)}

      <!-- ══ PHOTO SECTION ══ -->
      <text:p text:style-name="PSection">RELACIÓN FOTOGRÁFICA</text:p>
      ${buildPhotoTableXml(obj.photos)}
      <text:p text:style-name="PEmpty"/>

    </office:text>
  </office:body>
</office:document-content>`;
    }

    // ── PDF EXPORT ────────────────────────────────────────────────────────────

    async function exportPDF() {
      if (!window.jspdf) { toast('No se pudo cargar jsPDF.'); return; }
      const obj = buildExportObject();
      if (!obj.photos.length) { toast('No hay fotografías para exportar.'); return; }
      toast('Generando PDF…');

      await Promise.all(obj.photos.map(p => loadImgDims(p)));

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

      const PW = 210, PH = 297;
      const ML = 18, MR = 18, MT = 18, MB = 16;
      const CW = (PW - ML - MR - 5) / 2; // column width
      const ACCENT = [200, 152, 107];
      const DARK   = [26, 26, 46];
      const GREY   = [107, 114, 128];
      const LIGHT  = [243, 244, 246];
      const WHITE  = [255, 255, 255];
      const BORDER = [209, 213, 219];

      const h = obj.header;

      // ── helpers ──
      const rgb = (c) => ({ r: c[0], g: c[1], b: c[2] });
      function setColor(c) { doc.setTextColor(c[0], c[1], c[2]); }
      function setFill(c)  { doc.setFillColor(c[0], c[1], c[2]); }
      function setDraw(c)  { doc.setDrawColor(c[0], c[1], c[2]); }

      // ── COVER PAGE ──────────────────────────────────────────────────────────
      // Gold top bar
      setFill(ACCENT);
      doc.rect(0, 0, PW, 2.5, 'F');

      // Title block
      let y = MT + 4;
      setColor(DARK);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(20);
      doc.text('REPORTAJE FOTOGRÁFICO', ML, y);
      y += 8;
      doc.setFontSize(13);
      doc.text('DE REGISTRO', ML, y);

      // Accent rule
      y += 5;
      setDraw(ACCENT);
      doc.setLineWidth(0.5);
      doc.line(ML, y, PW - MR, y);
      y += 6;

      // Date subtitle
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      setColor(GREY);
      doc.text(`Documento generado el ${new Date().toLocaleString('es-ES')}`, ML, y);
      y += 10;

      // ── Info table ──────────────────────────────────────────────────────────
      const infoRows = [
        ['Asunto', h.asunto],
        ['Grupo de Investigación', h.grupo],
        ['Juzgado', h.juzgado],
        ['Procedimiento', h.procedimiento],
        ['Fecha y hora del registro', h.fechaHora],
        ['Dirección', h.direccion],
      ].filter(r => r[1]);

      if (h.observacionesGenerales) infoRows.push(['Observaciones generales', h.observacionesGenerales]);

      if (infoRows.length) {
        const TW = PW - ML - MR;
        const LC = 46; // label column width
        const VC = TW - LC;
        const RPAD = 3;
        const LPAD = 3.5;
        const ROW_H = 7;

        // table border
        setDraw(BORDER);
        doc.setLineWidth(0.25);

        infoRows.forEach((row, i) => {
          const ry = y + i * ROW_H;
          // label cell bg
          setFill(LIGHT);
          doc.rect(ML, ry, LC, ROW_H, 'F');
          // value cell bg
          setFill(WHITE);
          doc.rect(ML + LC, ry, VC, ROW_H, 'F');
          // row border
          setDraw(BORDER);
          doc.rect(ML, ry, TW, ROW_H);
          doc.line(ML + LC, ry, ML + LC, ry + ROW_H);

          // label text
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(7);
          setColor(GREY);
          doc.text(row[0].toUpperCase(), ML + LPAD, ry + ROW_H / 2 + 2);

          // value text (wrap if needed)
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(9.5);
          setColor(DARK);
          const lines = doc.splitTextToSize(row[1] || '', VC - RPAD * 2);
          doc.text(lines[0], ML + LC + RPAD, ry + ROW_H / 2 + 2.2);
        });

        y += infoRows.length * ROW_H + 10;
      }

      // ── PHOTO PAGES ─────────────────────────────────────────────────────────
      // Layout: 2 cols × 2 rows = 4 per page
      // Fixed image height so all thumbnails align; respect aspect ratio within cell
      const photos = obj.photos;
      const CELL_PAD = 3;
      const NUM_H = 5;      // photo number label height
      const CAPTION_H = 9;  // caption area height (2 lines max)
      const CELL_GAP = 5;   // gap between columns/rows

      // Available vertical space for photos section per page
      const PHOTOS_Y_START = MT + 18; // after small page header
      const USABLE_H = PH - PHOTOS_Y_START - MB;
      const IMG_H = (USABLE_H - CELL_GAP - (NUM_H + CAPTION_H + CELL_PAD * 2) * 2) / 2;
      const CELL_H = NUM_H + CELL_PAD + IMG_H + CELL_PAD + CAPTION_H;

      function drawPageHeader(doc, h) {
        // Thin gold rule at top
        setFill(ACCENT);
        doc.rect(0, 0, PW, 1.5, 'F');
        // Header text
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(6.5);
        setColor(GREY);
        doc.text('REPORTAJE FOTOGRÁFICO DE REGISTRO', ML, MT - 4);
        if (h.asunto) {
          doc.setFont('helvetica', 'normal');
          doc.text(`· ${h.asunto}`, ML + 65, MT - 4);
        }
        setDraw([229, 231, 235]);
        doc.setLineWidth(0.2);
        doc.line(ML, MT - 2, PW - MR, MT - 2);
      }

      function drawPhotoCell(doc, photo, gIdx, x, y) {
        const cellW = CW;

        // Cell background + border
        setFill(WHITE);
        setDraw(BORDER);
        doc.setLineWidth(0.25);
        doc.roundedRect(x, y, cellW, CELL_H, 1.5, 1.5, 'FD');

        // Photo number label
        const numero = photo.numero || String(gIdx + 1).padStart(3, '0');
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(6.5);
        setColor(ACCENT);
        doc.text(`FOTOGRAFÍA ${numero}`, x + CELL_PAD, y + NUM_H - 0.5);

        // Thin accent underline below label
        setDraw(ACCENT);
        doc.setLineWidth(0.18);
        doc.line(x + CELL_PAD, y + NUM_H + 0.4, x + cellW - CELL_PAD, y + NUM_H + 0.4);

        // Image: respect aspect ratio, centered in the image slot
        const imgSlotW = cellW - CELL_PAD * 2;
        const ratio = (photo._w && photo._h) ? photo._w / photo._h : 4 / 3;
        let iW = imgSlotW;
        let iH = iW / ratio;
        if (iH > IMG_H) { iH = IMG_H; iW = iH * ratio; }
        const ix = x + CELL_PAD + (imgSlotW - iW) / 2;
        const iy = y + NUM_H + CELL_PAD;

        // Image background
        setFill(LIGHT);
        doc.rect(x + CELL_PAD, iy, imgSlotW, IMG_H, 'F');

        try {
          const fmt = (photo.mimeType || '').includes('png') ? 'PNG' : 'JPEG';
          doc.addImage(photo.dataUrl, fmt, ix, iy + (IMG_H - iH) / 2, iW, iH, undefined, 'MEDIUM');
        } catch (_) {
          doc.setFont('helvetica', 'italic');
          doc.setFontSize(7);
          setColor(GREY);
          doc.text('[imagen no disponible]', x + cellW / 2, iy + IMG_H / 2, { align: 'center' });
        }

        // Caption
        if (photo.note) {
          const captionY = y + NUM_H + CELL_PAD + IMG_H + CELL_PAD + 2;
          setDraw([229, 231, 235]);
          doc.setLineWidth(0.15);
          doc.line(x + CELL_PAD, captionY - 1.5, x + cellW - CELL_PAD, captionY - 1.5);
          doc.setFont('helvetica', 'italic');
          doc.setFontSize(7.5);
          setColor([55, 65, 81]);
          const cLines = doc.splitTextToSize(photo.note, cellW - CELL_PAD * 2);
          doc.text(cLines.slice(0, 2), x + CELL_PAD, captionY + 1);
        }
      }

      // Draw photo pages
      for (let i = 0; i < photos.length; i++) {
        const posInPage = i % 4;
        if (posInPage === 0) {
          if (i > 0) doc.addPage();
          drawPageHeader(doc, h);
        }
        const col = posInPage % 2;
        const row = Math.floor(posInPage / 2);
        const x = ML + col * (CW + CELL_GAP);
        const y = PHOTOS_Y_START + row * (CELL_H + CELL_GAP);
        drawPhotoCell(doc, photos[i], i, x, y);
      }

      // Page numbers
      const totalPages = doc.getNumberOfPages();
      for (let p = 1; p <= totalPages; p++) {
        doc.setPage(p);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7);
        setColor(GREY);
        doc.text(`${p} / ${totalPages}`, PW - MR, PH - 8, { align: 'right' });
      }

      const slug = (h.asunto || 'reportaje').replace(/[^a-zA-ZáéíóúñÁÉÍÓÚÑ0-9 _-]/g, '').trim().replace(/ +/g, '_');
      doc.save(`${slug || 'reportaje_fotografico'}.pdf`);
      toast('PDF exportado');
    }


    function bindEvents() {
      $('btnGuardarCabecera')?.addEventListener('click', saveHeaderFromInputs);
      $('btnResetAll')?.addEventListener('click', resetAll);
      $('btnOpenModal')?.addEventListener('click', () => openModal('add'));
      $('btnCloseModal')?.addEventListener('click', closeModal);
      $('btnClearFields')?.addEventListener('click', clearModalFields);
      $('btnExportJson')?.addEventListener('click', exportJSON);
      $('btnExportOdt')?.addEventListener('click', exportODT);
      $('btnExportPdf')?.addEventListener('click', exportPDF);
      $('btnSolicitarCamara')?.addEventListener('click', startCamera);
      $('btnCapturar')?.addEventListener('click', captureFromCamera);

      $('backdrop')?.addEventListener('click', (e) => {
        if (e.target === $('backdrop')) closeModal();
      });

      $('btnAddPhoto')?.addEventListener('click', async () => {
        const mode = $('btnAddPhoto').dataset.mode || 'add';
        if (mode === 'edit') {
          const editId = $('btnAddPhoto').dataset.editId;
          if (!editId) return toast('No hay fotografía seleccionada.');
          await editPhoto(editId);
        } else {
          await addPhoto();
        }
      });

      $('fotoNota')?.addEventListener('keydown', async (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          $('btnAddPhoto').click();
        }
      });

      $('list')?.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        if (!action || !id) return;
        if (action === 'edit') openModal('edit', id);
        if (action === 'del') deletePhoto(id);
      });

      ['asunto','grupo','juzgado','procedimiento','fechaHora','direccion','observacionesGenerales'].forEach((id) => {
        $(id)?.addEventListener('change', () => {
          state.header[id] = ($(id).value || '').trim();
          saveState();
        });
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadState();
      renderHeader();
      renderList();
      bindEvents();
    });
  </script>
</body>
