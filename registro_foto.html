<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro · Reportaje Fotográfico</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1a1a2e;
      --secondary: #16213e;
      --accent: #c8986b;
      --accent-light: #d4ab7f;
      --text-light: #f5f5f5;
      --text-muted: #a0a0a0;
      --surface: #0f0f1e;
      --border: rgba(200, 152, 107, 0.2);
      --shadow: rgba(0, 0, 0, 0.4);
      --danger: rgba(255,120,120,.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Crimson Pro', serif;
      background: linear-gradient(135deg, var(--surface) 0%, var(--primary) 100%);
      color: var(--text-light);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.55;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .info-card {
      background: rgba(22, 33, 62, 0.62);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 8px 32px var(--shadow);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 720px){
      .grid { grid-template-columns: 1fr 1fr; }
      .span2 { grid-column: 1 / -1; }
    }

    .form-group { margin-bottom: 0; }

    .form-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      display: block;
      font-weight: 500;
    }

    .form-input,
    .form-textarea,
    .form-file {
      width: 100%;
      padding: 14px 16px;
      background: rgba(15, 15, 30, 0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-light);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-file { padding: 12px 14px; }

    .form-input:focus,
    .form-textarea:focus,
    .form-file:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 152, 107, 0.1);
    }

    .form-textarea { min-height: 120px; resize: vertical; }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn-add,
    .btn-export,
    .btn-danger {
      padding: 15px 18px;
      border-radius: 12px;
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      min-height: 52px;
      flex: 1;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: var(--primary);
      box-shadow: 0 4px 20px rgba(200, 152, 107, 0.28);
      text-transform: uppercase;
    }

    .btn-export {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-light);
      border: 1px solid var(--border);
      text-transform: uppercase;
    }

    .btn-danger {
      background: rgba(255,255,255,.05);
      color: var(--text-light);
      border: 1px solid rgba(255,120,120,.28);
      text-transform: uppercase;
    }

    .btn-add:hover,
    .btn-export:hover,
    .btn-danger:hover,
    .icon-btn:hover,
    .btn:hover {
      transform: translateY(-2px);
    }

    .photos-section { margin-top: 26px; }

    .photos-title {
      font-size: 1.45rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .evidence-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      background: rgba(200, 152, 107, 0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
      color: var(--text-light);
      white-space: nowrap;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 720px){
      .photo-grid { grid-template-columns: 1fr 1fr; }
    }

    .photo-card {
      background: rgba(22, 33, 62, 0.4);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .photo-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .photo-number {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .photo-image-wrap {
      background: rgba(0,0,0,.22);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,.06);
    }

    .photo-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-note {
      color: var(--text-light);
      font-size: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
      padding-top: 4px;
    }

    .photo-filename {
      color: var(--text-muted);
      font-size: .95rem;
    }

    .photo-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .icon-btn, .btn {
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-family: inherit;
      font-size: .95rem;
    }

    .icon-btn.danger { border-color: rgba(255,120,120,.25); }
    .icon-btn.danger:hover { background: rgba(255,120,120,.12); }

    .empty-state {
      text-align: center;
      padding: 46px 16px;
      color: var(--text-muted);
      font-style: italic;
      border: 1px dashed rgba(200, 152, 107, 0.25);
      border-radius: 14px;
      background: rgba(22,33,62,0.25);
    }

    .empty-state svg {
      width: 72px;
      height: 72px;
      margin-bottom: 14px;
      opacity: 0.25;
      display:block;
      margin-left:auto;
      margin-right:auto;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      padding: 16px;
    }

    .modal-overlay.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .modal {
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      margin-top: 12px;
      max-height: calc(100dvh - 24px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .modal h2 {
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--accent);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
      position: sticky;
      bottom: 0;
      background: var(--secondary);
      padding-top: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      z-index: 5;
    }

    .hint {
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .preview-box {
      margin-top: 10px;
      background: rgba(0,0,0,.18);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.05);
      min-height: 140px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 280px;
      border-radius: 10px;
      display: block;
    }

    .preview-placeholder { color: var(--text-muted); text-align:center; }

    .capture-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .camera-box {
      margin-top: 10px;
      background: rgba(0,0,0,.18);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.05);
      display: none;
      gap: 10px;
      flex-direction: column;
    }

    .camera-box.active { display: flex; }

    .camera-video {
      width: 100%;
      max-height: 320px;
      background: #000;
      border-radius: 10px;
      object-fit: cover;
    }

    .camera-note {
      font-family: 'DM Mono', monospace;
      font-size: 0.76rem;
      color: var(--text-muted);
    }


    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.75);
      border: 1px solid var(--border);
      color: var(--text-light);
      padding: 10px 14px;
      border-radius: 999px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      display: none;
      z-index: 2000;
      max-width: calc(100% - 28px);
      text-align: center;
    }

    .toast.show { display:block; }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .button-group, .modal-buttons { flex-direction: column; }
      .btn-add, .btn-export, .btn-danger, .btn { width: 100%; }
      .modal { padding: 20px; }
      .form-textarea { min-height: 90px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Reportaje Fotográfico de Registro</h1>
      <div class="subtitle">Captura, organiza y exporta a ODT o PDF · 2 columnas · 4 fotos por página</div>
    </div>

    <section class="info-card" aria-label="Datos del registro">
      <div class="grid">
        <div class="form-group">
          <label class="form-label" for="asunto">Asunto</label>
          <input class="form-input" id="asunto" placeholder="Ej: Entrada y registro en domicilio" />
        </div>
        <div class="form-group">
          <label class="form-label" for="grupo">Grupo de Investigación</label>
          <input class="form-input" id="grupo" placeholder="Ej: Grupo / Unidad" />
        </div>
        <div class="form-group">
          <label class="form-label" for="juzgado">Juzgado</label>
          <input class="form-input" id="juzgado" placeholder="Ej: J. Instrucción nº..." />
        </div>
        <div class="form-group">
          <label class="form-label" for="procedimiento">Procedimiento</label>
          <input class="form-input" id="procedimiento" placeholder="Ej: DP 123/2026" />
        </div>
        <div class="form-group">
          <label class="form-label" for="fechaHora">Fecha y hora del registro</label>
          <input class="form-input" id="fechaHora" type="datetime-local" />
        </div>
        <div class="form-group span2">
          <label class="form-label" for="direccion">Dirección</label>
          <input class="form-input" id="direccion" placeholder="C/ ..., nº..., localidad" />
        </div>
        <div class="form-group span2">
          <label class="form-label" for="observacionesGenerales">Observaciones generales</label>
          <textarea class="form-textarea" id="observacionesGenerales" placeholder="Observaciones generales del reportaje o del registro."></textarea>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-add" id="btnGuardarCabecera" type="button">Guardar datos</button>
        <button class="btn-danger" id="btnResetAll" type="button">Borrar todo</button>
      </div>
    </section>

    <div class="button-group">
      <button class="btn-add" id="btnOpenModal" type="button">Añadir fotografía</button>
      <button class="btn-export" id="btnExportJson" type="button">Exportar JSON</button>
      <button class="btn-export" id="btnExportOdt" type="button">Exportar ODT</button>
      <button class="btn-export" id="btnExportPdf" type="button">Exportar PDF</button>
    </div>

    <section class="photos-section">
      <div class="photos-title">
        <span>Fotografías</span>
        <span class="evidence-count" id="count">0 fotografías</span>
      </div>

      <div id="list" class="photo-grid"></div>

      <div id="empty" class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7h4l2-2h4l2 2h4v12H4V7z" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="13" r="3.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Aún no has añadido fotografías. Pulsa “Añadir fotografía”.
      </div>
    </section>
  </div>

  <div class="modal-overlay" id="backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h2 id="modalTitle">Añadir fotografía</h2>

      <div class="form-group">
        <label class="form-label" for="fotoNumero">Nº de foto</label>
        <input class="form-input" id="fotoNumero" inputmode="numeric" placeholder="Ej: 001" />
      </div>

      <div class="form-group">
        <label class="form-label">Imagen</label>
        <!-- Input oculto: abre la cámara nativa a pantalla completa -->
        <input id="fotoArchivo" type="file" accept="image/*" capture="environment" style="display:none" />
        <button class="btn-add" id="btnSolicitarCamara" type="button" style="width:100%;margin-bottom:10px;">📷 Tomar fotografía</button>
      </div>

      <div class="preview-box" id="previewBox">
        <div class="preview-placeholder">Toma una fotografía para ver la vista previa.</div>
      </div>

      <div class="form-group" style="margin-top:12px;">
        <label class="form-label" for="fotoNota">Nota / pie de foto</label>
        <textarea class="form-textarea" id="fotoNota" placeholder="Ej: Vista general del salón a la entrada. Se aprecia mesa principal y equipo informático al fondo."></textarea>
      </div>

      <div class="modal-buttons">
        <button class="btn btn-add" id="btnAddPhoto" type="button" data-mode="add">Añadir</button>
        <button class="btn btn-secondary" id="btnClearFields" type="button">Limpiar</button>
        <button class="btn btn-secondary" id="btnCloseModal" type="button">Cerrar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script>
    const LS_KEY = 'reportaje_fotografico_registro_v1';
    const $ = (id) => document.getElementById(id);

    const state = {
      header: {
        asunto: '',
        grupo: '',
        juzgado: '',
        procedimiento: '',
        fechaHora: '',
        direccion: '',
        observacionesGenerales: ''
      },
      photos: []
      // {id, numero, note, fileName, mimeType, dataUrl, createdAt, source}
    };

    function toast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => t.classList.remove('show'), 1800);
    }

    function escapeHtml(str) {
      return (str ?? '')
        .toString()
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeXml(str) {
      return (str ?? '')
        .toString()
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&apos;');
    }

    function normalizeNumber(n) {
      const s = (n ?? '').toString().trim();
      if (!s) return '';
      if (/^\d+$/.test(s)) return String(Math.min(parseInt(s, 10), 999999)).padStart(3, '0');
      return s;
    }

    function nextAutoNumber() {
      const nums = state.photos
        .map(p => p.numero)
        .filter(n => /^\d+$/.test(n))
        .map(n => parseInt(n, 10));
      const max = nums.length ? Math.max(...nums) : 0;
      return String(max + 1).padStart(3, '0');
    }

    function safeId() {
      return `${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function saveState() {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') {
          state.header = { ...state.header, ...(parsed.header || {}) };
          state.photos = Array.isArray(parsed.photos) ? parsed.photos : [];
        }
      } catch (_e) {}
    }

    function renderHeader() {
      ['asunto','grupo','juzgado','procedimiento','fechaHora','direccion','observacionesGenerales'].forEach(id => {
        if ($(id)) $(id).value = state.header[id] || '';
      });
    }

    function sortedPhotos() {
      return [...state.photos].sort((a, b) => {
        const an = /^\d+$/.test(a.numero) ? parseInt(a.numero, 10) : null;
        const bn = /^\d+$/.test(b.numero) ? parseInt(b.numero, 10) : null;
        if (an !== null && bn !== null) return an - bn;
        if (an !== null && bn === null) return -1;
        if (an === null && bn !== null) return 1;
        return (a.createdAt || 0) - (b.createdAt || 0);
      });
    }

    function renderList() {
      const list = $('list');
      list.innerHTML = '';
      $('count').textContent = `${state.photos.length} fotografía${state.photos.length === 1 ? '' : 's'}`;

      if (!state.photos.length) {
        $('empty').style.display = 'block';
        return;
      }
      $('empty').style.display = 'none';

      for (const photo of sortedPhotos()) {
        const item = document.createElement('article');
        item.className = 'photo-card';
        item.innerHTML = `
          <div class="photo-meta">
            <div>
              <div class="photo-number">FOTOGRAFÍA ${escapeHtml(photo.numero || '—')}</div>
              <div class="photo-filename">${escapeHtml(photo.fileName || 'imagen')}</div>
            </div>
            <div class="photo-actions">
              <button class="icon-btn" type="button" data-action="edit" data-id="${escapeHtml(photo.
